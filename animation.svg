<svg width="360" height="60" xmlns="http://www.w3.org/2000/svg">
<defs>

  <filter id="glow" x="-10%" y="-30%" width="120%" height="160%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <pattern id="sl" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
    <rect y="2" width="1" height="2" fill="rgba(0,0,0,0.22)"/>
  </pattern>

  <radialGradient id="vg" cx="50%" cy="50%" r="70%">
    <stop offset="40%" stop-color="black" stop-opacity="0"/>
    <stop offset="100%" stop-color="black" stop-opacity="0.88"/>
  </radialGradient>

  <radialGradient id="gt" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#003d00" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#001100" stop-opacity="0"/>
  </radialGradient>

</defs>

<!-- Background -->
<rect width="360" height="60" fill="#000d00"/>
<rect width="360" height="60" fill="url(#gt)"/>

<!-- ╔══════════════════════════════════╗ -->
<!-- ║  EDIT THE TEXT CONTENT BELOW    ║ -->
<!-- ║  █ is the cursor block          ║ -->
<!-- ╚══════════════════════════════════╝ -->
<text x="16" y="40"
  font-family="'Courier New', Courier, monospace"
  font-size="22"
  fill="#39FF14"
  filter="url(#glow)">] 10 PRINT "HELLO, I'M DONNIE"█</text>

<!-- Scanlines + vignette overlays -->
<rect width="360" height="60" fill="url(#sl)"/>
<rect width="360" height="60" fill="url(#vg)"/>

</svg>
